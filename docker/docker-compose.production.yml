name: ragforge-production

x-ragforge-app: &ragforge-app
  build:
    context: ..
    dockerfile: docker/ragforge/Dockerfile
  image: ragforge-api:branch22
  env_file:
    - ./env/.env.app
  networks:
    - ragforge-backend
  init: true

services:
  ragforge-migrations:
    <<: *ragforge-app
    command: ['alembic', '-c', 'alembic.ini', 'upgrade', 'head']
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  ragforge-api:
    <<: *ragforge-app
    ports:
      - '127.0.0.1:8000:8000'
    expose:
      - '8000'
    volumes:
      - ragforge_uploads:/app/storage/uploads
    depends_on:
      ragforge-migrations:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 30s
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/v1/health/\", timeout=3).read()"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
  nginx:
    image: nginx:1.30.2-alpine-slim
    ports:
      - '127.0.0.1:8088:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ragforge-api:
        condition: service_healthy
    networks:
      - ragforge-backend
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/nginx-health | grep ok']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:7-jammy
    env_file:
      - ./env/.env.mongodb
    ports:
      - '127.0.0.1:27018:27017'
    volumes:
      - ragforge_mongodb_data:/data/db
    networks:
      - ragforge-backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet -u "$${MONGO_INITDB_ROOT_USERNAME}" -p "$${MONGO_INITDB_ROOT_PASSWORD}" --authenticationDatabase admin --eval "db.adminCommand({ ping: 1 }).ok" | grep 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    platform: linux/amd64
    image: pgvector/pgvector:0.8.0-pg17
    env_file:
      - ./env/.env.postgres
    ports:
      - '127.0.0.1:5434:5432'
    volumes:
      - ragforge_postgres_data:/var/lib/postgresql/data
    networks:
      - ragforge-backend
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.18.2
    ports:
      - '127.0.0.1:6335:6333'
      - '127.0.0.1:6336:6334'
    volumes:
      - ragforge_qdrant_data:/qdrant/storage
    networks:
      - ragforge-backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ragforge_prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      ragforge-api:
        condition: service_healthy
      postgres-exporter:
        condition: service_started
      node-exporter:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - ragforge-backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.2
    env_file:
      - ./env/.env.grafana
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - ragforge_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - ragforge-backend
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    env_file:
      - ./env/.env.postgres-exporter
    ports:
      - '127.0.0.1:9187:9187'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ragforge-backend
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.11.0
    ports:
      - '127.0.0.1:9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/host/root'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run/docker/.+)($$|/)'
    networks:
      - ragforge-backend
    restart: unless-stopped

networks:
  ragforge-backend:
    driver: bridge

volumes:
  ragforge_uploads:
  ragforge_mongodb_data:
  ragforge_postgres_data:
  ragforge_qdrant_data:
  ragforge_prometheus_data:
  ragforge_grafana_data:
