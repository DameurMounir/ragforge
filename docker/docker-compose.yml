services:
  mongodb:
    image: mongo:7-jammy
    container_name: ragforge-mongodb

    ports:
      - '27007:27017'

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

    volumes:
      - ragforge_mongodb_data:/data/db

    networks:
      - ragforge-network

    restart: always
  qdrant:
    image: qdrant/qdrant
    container_name: ragforge-qdrant
    ports:
      - '127.0.0.1:6333:6333'
      - '127.0.0.1:6334:6334'
    volumes:
      - ragforge_qdrant_data:/qdrant/storage
    networks:
      - ragforge-network
    restart: always

networks:
  ragforge-network:

volumes:
  ragforge_mongodb_data:
  ragforge_qdrant_data: